# quanbot tmux config — portable, low cognitive load
# Sourced via ~/.tmux.conf symlink (created by bin/setup)

# ── Prefix ────────────────────────────────────────────────────────────────────
# Change from Ctrl+b to Ctrl+a (easier on fingers)
unbind C-b
set -g prefix C-a
bind C-a send-prefix

# ── Sensible Defaults ─────────────────────────────────────────────────────────
set -g mouse on                      # Mouse support
set -g history-limit 10000           # Scrollback buffer
set -g base-index 1                  # Start window numbering at 1
setw -g pane-base-index 1            # Start pane numbering at 1
set -g renumber-windows on           # Renumber windows when one is closed
set -g default-terminal "screen-256color"  # Standard tmux terminal
set -ga terminal-overrides ",*256col*:Tc"  # True color support

# ── Vi Mode ───────────────────────────────────────────────────────────────────
setw -g mode-keys vi
bind -T copy-mode-vi v send -X begin-selection
bind -T copy-mode-vi y send -X copy-selection-and-cancel

# ── Window & Pane Navigation ──────────────────────────────────────────────────
# Split panes with | and -
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
unbind '"'
unbind %

# Switch panes with Alt+Arrow (no prefix needed)
bind -n M-Left select-pane -L
bind -n M-Right select-pane -R
bind -n M-Up select-pane -U
bind -n M-Down select-pane -D

# Switch windows with Shift+Arrow (no prefix needed)
bind -n S-Left previous-window
bind -n S-Right next-window

# Create new window in current path
bind c new-window -c "#{pane_current_path}"

# Enhanced window list with preview
bind w choose-tree -Zw

# Quick jump to window by number (no prefix needed for 1-9)
bind -n M-1 select-window -t 1
bind -n M-2 select-window -t 2
bind -n M-3 select-window -t 3
bind -n M-4 select-window -t 4
bind -n M-5 select-window -t 5
bind -n M-6 select-window -t 6
bind -n M-7 select-window -t 7
bind -n M-8 select-window -t 8
bind -n M-9 select-window -t 9

# ── Session Management ────────────────────────────────────────────────────────
# Reload config
bind r source-file ~/.tmux.conf \; display "Config reloaded"

# Initialize workspace layout on new session
set-hook -g after-new-session 'run-shell "~/Desktop/quanbot/bin/tmux-init-session"'

# ── Status Bar ────────────────────────────────────────────────────────────────
set -g status on
set -g status-interval 5
set -g status-position bottom
set -g status-justify left

# Status bar colors — gruvbox dark
set -g status-style bg=colour235,fg=colour223
set -g status-left-length 40
set -g status-right-length 80

# Left: session name and window count
set -g status-left "#[fg=colour214,bold] #S #[fg=colour223]│ #[fg=colour246]windows: #[fg=colour214]#{session_windows} #[fg=colour223]│ "

# Right: current path, time
set -g status-right "#[fg=colour246]#{pane_current_path} #[fg=colour223]│ #[fg=colour214]%H:%M %d-%b"

# Window status - make it VERY clear which window you're on
setw -g window-status-format "#[fg=colour246] #I:#W "
setw -g window-status-current-format "#[fg=colour214,bold,reverse] #I:#W "

# Pane borders
set -g pane-border-style fg=colour239
set -g pane-active-border-style fg=colour214

# ── Notifications ─────────────────────────────────────────────────────────────
# Visual bell (iTerm2 will catch this for macOS notifications)
set -g visual-activity off
set -g visual-bell on
set -g bell-action any
setw -g monitor-activity on

# ── Quick Reference ───────────────────────────────────────────────────────────
# Prefix: Ctrl+a
# Split: Prefix+| (horizontal), Prefix+- (vertical)
# Navigate panes: Alt+Arrow
# Navigate windows: Shift+Arrow
# List windows: Prefix+w
# New window: Prefix+c
# Detach: Prefix+d
# Reload config: Prefix+r
