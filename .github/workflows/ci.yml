name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-shell:
    name: ShellCheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run ShellCheck
        uses: ludeeus/action-shellcheck@master
        with:
          scandir: bin/

  lint-go:
    name: Go vet
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: dashboard/go.mod
      - name: Go vet
        run: cd dashboard && go vet ./...

  test-shell:
    name: Shell tests (bats)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install bats
        run: |
          git clone --depth 1 https://github.com/bats-core/bats-core.git /tmp/bats
          sudo /tmp/bats/install.sh /usr/local
      - name: Run tests
        run: bats test/

  test-go:
    name: Go tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: dashboard/go.mod
      - name: Run tests
        run: cd dashboard && go test ./...

  build:
    name: Build dashboard
    runs-on: ubuntu-latest
    needs: [lint-go, test-go]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: dashboard/go.mod
      - name: Build
        run: cd dashboard && go build -o ../bin/dashboard-go .
